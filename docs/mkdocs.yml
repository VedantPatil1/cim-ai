site_name: CIM-AI
site_description: Agentic AI-based Cloud Infrastructure Management
site_author: Vedant Patil
docs_dir: content
site_dir: site

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy


markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Installation:
      - Overview: installation/index.md
      - Phase 1 Setup: installation/Phase1.md
  - Platform Engineering:
      - Overview: platform-engineering/index.md
      - idpbuilder & CNOE: platform-engineering/01-idpbuilder-and-cnoe.md
      - CD Workflow Design: platform-engineering/02-cd-workflow-design.md
      - Manual Setup (Gitea Actions): platform-engineering/03-manual-setup-gitea-actions.md
