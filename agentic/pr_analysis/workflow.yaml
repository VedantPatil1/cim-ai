name: PR Analysis (pydantic-ai + MCP)

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  analyse:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update -qq && apt-get install -y -qq python3 python3-pip nodejs npm
          pip3 install "pydantic-ai[anthropic]" --quiet

      - name: Analyse PR
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITEA_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          GITEA_URL:          https://cnoe.localtest.me:8443/gitea
          REPO:               ${{ github.repository }}
          PR_NUMBER:          ${{ github.event.pull_request.number }}
        run: python3 .gitea/scripts/analyze_pr.py
