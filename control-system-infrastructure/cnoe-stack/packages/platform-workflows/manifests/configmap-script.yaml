# ConfigMap containing the sync script executed by the CronJob.
#
# The script:
#   1. Reads the Gitea admin password via kubectl (using the SA RBAC grant)
#   2. Lists all repos in the Gitea instance via the Gitea API
#   3. For each repo, checks whether each platform workflow file exists
#   4. Creates the file if missing; updates it if the content has changed
#
# This ensures every repo always has the current version of the platform workflows.
# Repos cannot permanently remove these files — the CronJob will reinstall them.

apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-workflow-sync-script
  namespace: platform-workflows
  labels:
    app.kubernetes.io/managed-by: argocd
    cim.ai/component: platform-workflows
data:
  sync.sh: |
    #!/bin/bash
    set -euo pipefail

    GITEA_URL="https://cnoe.localtest.me:8443/gitea"
    GITEA_USER="giteaAdmin"
    WORKFLOW_DIR="/workflows"

    echo "=== Platform Workflow Sync ==="
    echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"

    # ── Step 1: Get Gitea admin password via kubectl ──────────────────────────
    echo "Fetching Gitea admin credentials..."
    GITEA_PASS=$(kubectl get secret -n gitea gitea-credential \
      -o jsonpath='{.data.password}' | base64 -d)

    # ── Step 2: List all repos ────────────────────────────────────────────────
    echo "Listing repositories..."
    REPOS=$(curl -sk \
      -u "${GITEA_USER}:${GITEA_PASS}" \
      "${GITEA_URL}/api/v1/repos/search?limit=50&page=1" \
      | grep -o '"full_name":"[^"]*"' | cut -d'"' -f4)

    if [ -z "$REPOS" ]; then
      echo "No repositories found. Exiting."
      exit 0
    fi

    echo "Found repos: $REPOS"

    # ── Step 3: Sync each workflow file to each repo ──────────────────────────
    for WORKFLOW_FILE in "${WORKFLOW_DIR}"/*.yaml; do
      FILENAME=$(basename "$WORKFLOW_FILE")
      DEST_PATH=".gitea/workflows/${FILENAME}"

      # Base64-encode the workflow content for the Gitea API
      CONTENT=$(base64 < "$WORKFLOW_FILE" | tr -d '\n')

      for REPO in $REPOS; do
        echo "--- Processing ${REPO} / ${DEST_PATH} ---"

        # Check if the file already exists
        HTTP_STATUS=$(curl -sk -o /dev/null -w "%{http_code}" \
          -u "${GITEA_USER}:${GITEA_PASS}" \
          "${GITEA_URL}/api/v1/repos/${REPO}/contents/${DEST_PATH}")

        if [ "$HTTP_STATUS" = "404" ]; then
          # File does not exist — create it
          echo "  Installing ${FILENAME} to ${REPO}..."
          curl -sk -o /dev/null \
            -u "${GITEA_USER}:${GITEA_PASS}" \
            -X POST \
            -H "Content-Type: application/json" \
            "${GITEA_URL}/api/v1/repos/${REPO}/contents/${DEST_PATH}" \
            -d "{
              \"message\": \"chore(platform): install ${FILENAME} [platform-enforced]\",
              \"content\": \"${CONTENT}\"
            }"
          echo "  Installed."

        elif [ "$HTTP_STATUS" = "200" ]; then
          # File exists — check if content matches
          EXISTING=$(curl -sk \
            -u "${GITEA_USER}:${GITEA_PASS}" \
            "${GITEA_URL}/api/v1/repos/${REPO}/contents/${DEST_PATH}")

          CURRENT_CONTENT=$(echo "$EXISTING" | grep -o '"content":"[^"]*"' | cut -d'"' -f4 | tr -d '\n ')
          FILE_SHA=$(echo "$EXISTING" | grep -o '"sha":"[^"]*"' | cut -d'"' -f4)

          if [ "$CURRENT_CONTENT" != "$CONTENT" ]; then
            echo "  Content outdated, updating ${FILENAME} in ${REPO}..."
            curl -sk -o /dev/null \
              -u "${GITEA_USER}:${GITEA_PASS}" \
              -X PUT \
              -H "Content-Type: application/json" \
              "${GITEA_URL}/api/v1/repos/${REPO}/contents/${DEST_PATH}" \
              -d "{
                \"message\": \"chore(platform): update ${FILENAME} [platform-enforced]\",
                \"content\": \"${CONTENT}\",
                \"sha\": \"${FILE_SHA}\"
              }"
            echo "  Updated."
          else
            echo "  Already up to date."
          fi

        else
          echo "  WARNING: Unexpected status ${HTTP_STATUS} for ${REPO}/${DEST_PATH}, skipping."
        fi
      done
    done

    echo "=== Sync complete ==="
