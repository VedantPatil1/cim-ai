# CronJob — Platform Workflow Sync
#
# Runs every 15 minutes. Installs/updates the platform workflow files
# (secret-scan.yaml, sandbox-lifecycle.yaml) in every Gitea repo via the API.
#
# On initial ArgoCD sync an immediate Job is also created (the CronJob
# spec startingDeadlineSeconds ensures the first run happens quickly).
# If you want to trigger an immediate sync manually:
#   kubectl create job -n platform-workflows --from=cronjob/platform-workflow-sync manual-sync-$(date +%s)

apiVersion: batch/v1
kind: CronJob
metadata:
  name: platform-workflow-sync
  namespace: platform-workflows
  labels:
    app.kubernetes.io/managed-by: argocd
    cim.ai/component: platform-workflows
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid          # Don't stack runs if the previous hasn't finished
  startingDeadlineSeconds: 300       # Catch up within 5 minutes if the schedule was missed
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            cim.ai/component: platform-workflows
        spec:
          serviceAccountName: platform-workflows
          restartPolicy: OnFailure

          containers:
            - name: sync
              # bitnami/kubectl has both kubectl and bash; curl/base64/grep are standard
              image: bitnami/kubectl:latest
              command: ["/bin/bash", "/scripts/sync.sh"]
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                - name: workflows
                  mountPath: /workflows
              resources:
                requests:
                  cpu: "50m"
                  memory: "64Mi"
                limits:
                  cpu: "200m"
                  memory: "256Mi"

          volumes:
            # Sync script (from configmap-script.yaml)
            - name: scripts
              configMap:
                name: platform-workflow-sync-script
                defaultMode: 0755
            # Workflow YAML files to propagate (from configmap-workflows.yaml)
            - name: workflows
              configMap:
                name: platform-workflow-definitions
