# Gitea Actions runner — in-cluster Deployment
#
# Architecture:
#   init1 (get-gitea-creds):  reads gitea-credential Secret via kubectl → writes to emptyDir
#   init2 (get-runner-token): calls Gitea API with curl → writes token to emptyDir
#   init3 (register-runner):  runs act_runner register with workingDir=/data
#                             skips if /data/.runner already exists (PVC — survives restarts)
#   main  (runner):           runs act_runner daemon with workingDir=/data
#   sidecar (dind):           Docker-in-Docker daemon with TLS; enables image builds in CI
#
# Key design decisions:
#   workingDir: /data on register-runner and runner
#     act_runner stores its registration in .runner relative to workingDir.
#     Setting workingDir=/data means /data/.runner is on the PVC and survives pod restarts.
#   In-cluster HTTP URL for Gitea
#     Avoids TLS cert verification issues with idpbuilder's self-signed cert.
#     The runner communicates via http://my-gitea-http.gitea.svc.cluster.local:3000.
#   curl in a separate init container (get-runner-token)
#     gitea/act_runner image does not include curl.
#
# Runner labels registered with Gitea:
#   ubuntu-latest  — default label; standard CI workflows
#   sandbox        — reserved for sandbox management workflows
#
# Security note:
#   DinD requires privileged: true. Acceptable for a local dissertation cluster.
#   In production: replace with Kaniko (rootless image builds).

apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea-runner
  namespace: gitea-runner
  labels:
    app: gitea-runner
    app.kubernetes.io/managed-by: argocd
    cim.ai/component: gitea-runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gitea-runner
  template:
    metadata:
      labels:
        app: gitea-runner
        cim.ai/component: gitea-runner
    spec:
      serviceAccountName: gitea-runner

      initContainers:

        # Step 1: Fetch Gitea admin password via kubectl (uses SA RBAC grant).
        - name: get-gitea-creds
          image: bitnami/kubectl:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Fetching gitea-credential secret from gitea namespace..."
              kubectl get secret -n gitea gitea-credential \
                -o jsonpath='{.data.password}' \
                | base64 -d > /shared/gitea-password
              echo "Password written to /shared/gitea-password"
          volumeMounts:
            - name: shared-init
              mountPath: /shared

        # Step 2: Fetch runner registration token from Gitea API.
        # Uses curlimages/curl — act_runner image does not include curl.
        # Skips if /data/.runner already exists (runner was registered in a previous pod lifecycle).
        - name: get-runner-token
          image: curlimages/curl:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              if [ -f /data/.runner ]; then
                echo "Runner already registered (/data/.runner exists), skipping token fetch."
                exit 0
              fi

              GITEA_PASS=$(cat /shared/gitea-password)
              echo "Getting runner registration token from Gitea API..."
              TOKEN=$(curl -sk \
                -u "giteaAdmin:${GITEA_PASS}" \
                https://cnoe.localtest.me:8443/gitea/api/v1/admin/runners/registration-token \
                | grep -o '"token":"[^"]*"' | cut -d'"' -f4)

              if [ -z "$TOKEN" ]; then
                echo "ERROR: Failed to get registration token."
                exit 1
              fi

              echo "$TOKEN" > /shared/runner-token
              echo "Token written to /shared/runner-token"
          volumeMounts:
            - name: runner-data
              mountPath: /data
            - name: shared-init
              mountPath: /shared

        # Step 3: Register the runner with Gitea.
        # workingDir=/data → act_runner writes .runner to /data/.runner (on PVC).
        # In-cluster HTTP URL avoids self-signed TLS cert issues.
        - name: register-runner
          image: gitea/act_runner:latest
          workingDir: /data
          command: ["/bin/sh", "-c"]
          args:
            - |
              if [ -f /data/.runner ]; then
                echo "Runner already registered (/data/.runner exists), skipping."
                exit 0
              fi

              TOKEN=$(cat /shared/runner-token)
              echo "Registering runner as 'in-cluster-runner'..."
              act_runner register \
                --no-interactive \
                --instance http://my-gitea-http.gitea.svc.cluster.local:3000 \
                --token "${TOKEN}" \
                --name in-cluster-runner \
                --labels "ubuntu-latest:docker://node:20-bullseye,sandbox:docker://node:20-bullseye"

              echo "Runner registration complete. .runner file:"
              cat /data/.runner
          volumeMounts:
            - name: runner-data
              mountPath: /data
            - name: shared-init
              mountPath: /shared
              readOnly: true

      containers:

        # Main: act_runner daemon.
        # workingDir=/data → reads .runner from /data/.runner (on PVC).
        # Sleeps 10s to allow dind to finish writing TLS certs before the Go Docker
        # SDK attempts its first connection.
        - name: runner
          image: gitea/act_runner:latest
          workingDir: /data
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Waiting 10s for dind TLS cert generation..."
              sleep 10
              echo "Starting act_runner daemon..."
              exec act_runner daemon
          env:
            - name: DOCKER_HOST
              value: tcp://localhost:2376
            - name: DOCKER_TLS_VERIFY
              value: "1"
            - name: DOCKER_CERT_PATH
              value: /certs/client
          volumeMounts:
            - name: runner-data
              mountPath: /data
            - name: dind-certs
              mountPath: /certs
              readOnly: true
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "1"
              memory: "1Gi"

        # Sidecar: Docker-in-Docker daemon (privileged).
        # Generates TLS certs to /certs on startup; runner reads /certs/client.
        - name: dind
          image: docker:24-dind
          securityContext:
            privileged: true
          env:
            - name: DOCKER_TLS_CERTDIR
              value: /certs
          volumeMounts:
            - name: dind-certs
              mountPath: /certs
            - name: dind-storage
              mountPath: /var/lib/docker
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "4Gi"

      volumes:
        # PVC: persists .runner registration file across pod restarts
        - name: runner-data
          persistentVolumeClaim:
            claimName: gitea-runner-data
        # Shared emptyDir: passes Gitea password and runner token between init containers
        - name: shared-init
          emptyDir: {}
        # TLS certs generated by dind, read by runner (shared emptyDir within pod)
        - name: dind-certs
          emptyDir: {}
        # Docker layer cache for dind
        - name: dind-storage
          emptyDir: {}
