# ArgoCD Application — Gitea Actions Runner (in-cluster)
#
# Deployed as part of the control system bootstrap:
#   idpbuilder create --use-path-routing \
#     -c gitea:./control-system-infrastructure/cnoe-stack/gitea-config/override.yaml \
#     -p ./control-system-infrastructure/cnoe-stack/packages/gitea-runner
#
# idpbuilder pushes manifests/ into a new Gitea repo and rewrites repoURL.
# ArgoCD then owns the lifecycle of the runner deployment.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitea-runner
  namespace: argocd
spec:
  project: default
  source:
    repoURL: cnoe://manifests
    targetRevision: HEAD
    path: "."
  destination:
    server: https://kubernetes.default.svc
    namespace: gitea-runner
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true   # needed for cross-namespace Role/RoleBinding
