apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: keycloak
  labels:
    app: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.0.6
          args:
            - start-dev
            - --import-realm
          env:
            # ── Admin credentials ─────────────────────────────────────────
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              value: "admin"
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak
                  key: admin-password

            # ── Path routing ──────────────────────────────────────────────
            - name: KC_HTTP_RELATIVE_PATH
              value: "/keycloak"
            # Must include port 8443 so OIDC discovery advertises the right URL.
            # Without this, nginx strips the port from X-Forwarded-Host and
            # Keycloak advertises https://cnoe.localtest.me (port 443).
            - name: KC_HOSTNAME
              value: "https://cnoe.localtest.me:8443/keycloak"

            # ── Proxy / TLS ───────────────────────────────────────────────
            - name: KC_PROXY_HEADERS
              value: "xforwarded"
            - name: KC_HOSTNAME_STRICT
              value: "false"
            - name: KC_HTTP_ENABLED
              value: "true"

          ports:
            - containerPort: 8080
              name: http

          volumeMounts:
            - name: realm-import
              mountPath: /opt/keycloak/data/import

          readinessProbe:
            # start-dev mode does not load smallrye-health — no /health/ready endpoint.
            # Use OIDC discovery as readiness signal instead.
            httpGet:
              path: /keycloak/realms/master/.well-known/openid-configuration
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 12

          livenessProbe:
            httpGet:
              path: /keycloak/realms/master/.well-known/openid-configuration
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"

      volumes:
        - name: realm-import
          configMap:
            name: keycloak-realm
