# ---------------------------------------------------------------------------
# Keycloak Deployment
#
# Uses the official Keycloak image (quay.io/keycloak/keycloak:26.0.6).
# Runs in start-dev mode (appropriate for local kind development).
# H2 embedded DB, no TLS, no hostname strictness.
#
# Path routing:
#   Keycloak is served at https://cnoe.localtest.me:8443/keycloak
#   KC_HTTP_RELATIVE_PATH=/keycloak must match the ingress path prefix.
# ---------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: keycloak
  labels:
    app: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.0.6
          args:
            - start-dev
            - --import-realm
          env:
            # ── Admin credentials ─────────────────────────────────────────
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              value: "admin"
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak
                  key: admin-password

            # ── Path routing ──────────────────────────────────────────────
            # Keycloak is served at /keycloak via nginx path routing.
            - name: KC_HTTP_RELATIVE_PATH
              value: "/keycloak"
            # External URL — tells Keycloak what port to use in OIDC discovery.
            # Without this, nginx strips the port from X-Forwarded-Host and
            # Keycloak advertises https://cnoe.localtest.me (port 443) instead of :8443.
            - name: KC_HOSTNAME
              value: "https://cnoe.localtest.me:8443/keycloak"

            # ── Proxy / TLS ───────────────────────────────────────────────
            - name: KC_PROXY_HEADERS
              value: "xforwarded"
            - name: KC_HOSTNAME_STRICT
              value: "false"
            - name: KC_HTTP_ENABLED
              value: "true"

          ports:
            - containerPort: 8080
              name: http

          volumeMounts:
            - name: realm-import
              mountPath: /opt/keycloak/data/import

          readinessProbe:
            # start-dev mode does not load smallrye-health, so no /health/ready endpoint.
            # Use the OIDC discovery endpoint as a readiness signal instead.
            httpGet:
              path: /keycloak/realms/master/.well-known/openid-configuration
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 12

          livenessProbe:
            httpGet:
              path: /keycloak/realms/master/.well-known/openid-configuration
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"

      volumes:
        - name: realm-import
          configMap:
            name: keycloak-realm
