apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server
  namespace: mcp-server
  labels:
    app: mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-server
  template:
    metadata:
      labels:
        app: mcp-server
    spec:
      containers:
        - name: mcp-server
          # Python slim — no GPU, no heavy deps; pydantic is the only requirement.
          image: python:3.12-slim
          command:
            - /bin/sh
            - -c
            - |
              pip install pydantic --quiet
              exec python /app/mcp_server.py --port 8765
          ports:
            - name: http
              containerPort: 8765
          volumeMounts:
            - name: src
              mountPath: /app
          readinessProbe:
            httpGet:
              path: /health
              port: 8765
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8765
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mcp-server-secrets
                  key: ANTHROPIC_API_KEY
                  # optional: true so the server starts without Claude;
                  # find_policy_violations falls back to listing policies manually.
                  optional: true
      volumes:
        - name: src
          configMap:
            name: mcp-server-src
