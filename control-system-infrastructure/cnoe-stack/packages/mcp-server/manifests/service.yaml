apiVersion: v1
kind: Service
metadata:
  name: mcp-server
  namespace: mcp-server
  labels:
    app: mcp-server
spec:
  selector:
    app: mcp-server
  ports:
    - name: http
      port: 8765
      targetPort: 8765
  type: ClusterIP
---
# In-cluster DNS name reachable by:
#   - Langflow (mcp-server.mcp-server.svc.cluster.local:8765)
#   - Gitea Actions runner (same DNS, from within the cluster)
#   - Any analysis component with network access to this namespace
