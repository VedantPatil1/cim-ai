# Placeholder Secret: gitea-admin-token
#
# The ArgoCD ApplicationSet PR generator needs a Gitea API token to poll for
# open pull requests. This Secret is read by the ApplicationSet spec:
#
#   tokenRef:
#     secretName: gitea-admin-token
#     key: token
#
# This Secret is a placeholder. The actual token value is populated by the
# bootstrap script during initial cluster setup. See README.md for instructions.
#
# To populate after cluster creation:
#   GITEA_PASS=$(kubectl get secret -n gitea gitea-credential -o jsonpath='{.data.password}' | base64 -d)
#   TOKEN=$(curl -sk -u "giteaAdmin:${GITEA_PASS}" \
#     -X POST "https://cnoe.localtest.me:8443/gitea/api/v1/users/giteaAdmin/tokens" \
#     -H "Content-Type: application/json" \
#     -d '{"name":"argocd-pr-reader","scopes":["read:repository","read:issue"]}' \
#     | grep -o '"sha1":"[^"]*"' | cut -d'"' -f4)
#   kubectl create secret generic gitea-admin-token -n argocd --from-literal=token="$TOKEN" \
#     --dry-run=client -o yaml | kubectl apply -f -

apiVersion: v1
kind: Secret
metadata:
  name: gitea-admin-token
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: argocd
    cim.ai/component: sandbox-environments
  annotations:
    # Prevent ArgoCD from syncing this back to the placeholder value after bootstrap
    argocd.argoproj.io/compare-options: IgnoreExtraneous
type: Opaque
stringData:
  token: "REPLACE_ME_SEE_README"
