# ArgoCD Setup Job — configures the sandbox-agent local user and RBAC
#
# Runs as a PostSync ArgoCD hook after the AppProject is created.
# Patches argocd-cm to add the sandbox-agent account and argocd-rbac-cm to
# grant it ApplicationSet management permissions.
#
# The Job is deleted on success (HookSucceeded policy) to keep the cluster clean.
# Re-running the sync is safe — kubectl patch --type=merge is idempotent.
#
# After this Job completes, run the manual bootstrap steps in README.md to:
#   1. Generate the ArgoCD API token for sandbox-agent
#   2. Create the Gitea token for the ApplicationSet PR generator
#   3. Store both as Gitea org secrets

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argocd-setup-job
  namespace: argocd
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
  labels:
    cim.ai/component: sandbox-environments

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argocd-configmap-patcher
  namespace: argocd
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
  labels:
    cim.ai/component: sandbox-environments
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["argocd-cm", "argocd-rbac-cm"]
    verbs: ["get", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argocd-setup-job-patcher
  namespace: argocd
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
  labels:
    cim.ai/component: sandbox-environments
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argocd-configmap-patcher
subjects:
  - kind: ServiceAccount
    name: argocd-setup-job
    namespace: argocd

---
apiVersion: batch/v1
kind: Job
metadata:
  name: argocd-sandbox-setup
  namespace: argocd
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
  labels:
    cim.ai/component: sandbox-environments
spec:
  template:
    spec:
      serviceAccountName: argocd-setup-job
      restartPolicy: OnFailure
      containers:
        - name: configure
          image: bitnami/kubectl:latest
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail

              echo "=== ArgoCD Sandbox Setup ==="

              # ── 1. Add sandbox-agent local account to argocd-cm ──────────────
              # accounts.<name>: "apiKey" enables API key generation for the account
              echo "Patching argocd-cm: adding sandbox-agent account..."
              kubectl patch configmap argocd-cm -n argocd \
                --type=merge \
                -p '{"data":{"accounts.sandbox-agent":"apiKey"}}'
              echo "  Done."

              # ── 2. Set RBAC policy in argocd-rbac-cm ─────────────────────────
              # Grants sandbox-agent permission to manage ApplicationSets only.
              # The role:sandbox-manager cannot deploy, sync, or manage regular apps.
              echo "Patching argocd-rbac-cm: setting sandbox-manager RBAC..."
              kubectl patch configmap argocd-rbac-cm -n argocd \
                --type=merge \
                -p '{
                  "data": {
                    "policy.csv": "p, role:sandbox-manager, applicationsets, get, */*, allow\np, role:sandbox-manager, applicationsets, create, */*, allow\np, role:sandbox-manager, applicationsets, update, */*, allow\np, role:sandbox-manager, applicationsets, delete, */*, allow\ng, sandbox-agent, role:sandbox-manager\n"
                  }
                }'
              echo "  Done."

              echo "=== Setup complete ==="
              echo ""
              echo "Next steps (manual — see sandbox-environments/README.md):"
              echo "  1. Generate ArgoCD API token:  argocd account generate-token --account sandbox-agent"
              echo "  2. Create Gitea token for PR generator (read:repository scope)"
              echo "  3. Store both as Gitea org secrets: ARGOCD_SANDBOX_TOKEN, GITEA_PR_TOKEN"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
