# ServiceAccount for the Keycloak client registration Job.
# Needs write access to the langflow-oauth2-proxy Secret in its own namespace.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: langflow-keycloak-job
  namespace: langflow
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: langflow-keycloak-job
  namespace: langflow
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["langflow-oauth2-proxy"]
    verbs: ["get", "update", "patch"]
  # Needed to restart oauth2-proxy and wait for rollout after patching the secret
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["oauth2-proxy"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments/status"]
    resourceNames: ["oauth2-proxy"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: langflow-keycloak-job
  namespace: langflow
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: langflow-keycloak-job
subjects:
  - kind: ServiceAccount
    name: langflow-keycloak-job
    namespace: langflow
---
# Allow the Job to read the Keycloak admin password from the keycloak namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: langflow-reads-keycloak-secret
  namespace: keycloak
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["keycloak"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: langflow-reads-keycloak-secret
  namespace: keycloak
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: langflow-reads-keycloak-secret
subjects:
  - kind: ServiceAccount
    name: langflow-keycloak-job
    namespace: langflow
