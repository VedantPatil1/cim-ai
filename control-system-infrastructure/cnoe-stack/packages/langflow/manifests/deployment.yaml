apiVersion: apps/v1
kind: Deployment
metadata:
  name: langflow
  namespace: langflow
  labels:
    app: langflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: langflow
  template:
    metadata:
      labels:
        app: langflow
    spec:
      # Resolve cnoe.localtest.me to the nginx ingress ClusterIP so that
      # in-cluster traffic (e.g. oauth2-proxy OIDC discovery) hits the right endpoint.
      hostAliases:
        - ip: "10.96.232.4"
          hostnames:
            - "cnoe.localtest.me"
      containers:
        - name: langflow
          image: langflowai/langflow:1.5.0
          ports:
            - containerPort: 7860
              name: http
          env:
            # ── Auth ──────────────────────────────────────────────────────
            - name: LANGFLOW_AUTO_LOGIN
              value: "true"
            - name: LANGFLOW_NEW_USER_IS_ACTIVE
              value: "true"

            # ── Persistence ──────────────────────────────────────────────
            - name: LANGFLOW_DATABASE_URL
              value: "sqlite:////app/data/langflow.db"
            - name: LANGFLOW_CONFIG_DIR
              value: "/app/data"

            # ── LLM API keys (from K8s Secret) ────────────────────────────
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: langflow-api-keys
                  key: ANTHROPIC_API_KEY

            # ── Networking ───────────────────────────────────────────────
            - name: LANGFLOW_HOST
              value: "0.0.0.0"
            - name: LANGFLOW_PORT
              value: "7860"
            - name: LANGFLOW_WORKERS
              value: "1"

          volumeMounts:
            - name: langflow-data
              mountPath: /app/data

          readinessProbe:
            httpGet:
              path: /health
              port: 7860
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6

          livenessProbe:
            httpGet:
              path: /health
              port: 7860
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"

      volumes:
        - name: langflow-data
          persistentVolumeClaim:
            claimName: langflow-data
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
  namespace: langflow
  labels:
    app: oauth2-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth2-proxy
  template:
    metadata:
      labels:
        app: oauth2-proxy
    spec:
      # Resolve cnoe.localtest.me → nginx ClusterIP for in-cluster OIDC discovery.
      hostAliases:
        - ip: "10.96.232.4"
          hostnames:
            - "cnoe.localtest.me"
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
          args:
            - --provider=oidc
            - --oidc-issuer-url=https://cnoe.localtest.me:8443/keycloak/realms/cnoe
            # nginx strips the port from X-Forwarded-Host so the issuer in the
            # discovery doc won't match what we expect. Skip verification.
            - --insecure-oidc-skip-issuer-verification=true
            - --ssl-insecure-skip-verify=true
            - --client-id=langflow
            - --redirect-url=https://cnoe.localtest.me:8443/langflow/oauth2/callback
            # auth-request mode: nginx does the proxying, oauth2-proxy only validates the session
            - --upstream=static://200
            - --http-address=0.0.0.0:4180
            - --email-domain=*
            - --cookie-secure=true
            - --cookie-samesite=lax
            - --skip-provider-button=true
            - --pass-access-token=true
            - --pass-authorization-header=true
            - --set-authorization-header=true
            - --scope=openid profile email
          env:
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: langflow-oauth2-proxy
                  key: client-secret
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: langflow-oauth2-proxy
                  key: cookie-secret
          ports:
            - containerPort: 4180
              name: http
          readinessProbe:
            httpGet:
              path: /ping
              port: 4180
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /ping
              port: 4180
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
