# ---------------------------------------------------------------------------
# langflow-api-keys
# ---------------------------------------------------------------------------
# USER ACTION REQUIRED: populate ANTHROPIC_API_KEY before applying.
#
# Option A — kubectl (recommended, never committed to Git):
#   kubectl create secret generic langflow-api-keys \
#     -n langflow \
#     --from-literal=ANTHROPIC_API_KEY=sk-ant-... \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# Option B — edit this file and apply (DO NOT commit with real key):
#   Replace the placeholder below and run: kubectl apply -f secret.yaml
#
# The Langflow pod will not start if ANTHROPIC_API_KEY is empty.
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: langflow-api-keys
  namespace: langflow
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "REPLACE_ME"
