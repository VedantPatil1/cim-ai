# ---------------------------------------------------------------------------
# langflow-api-keys
# ---------------------------------------------------------------------------
# USER ACTION REQUIRED: populate ANTHROPIC_API_KEY before applying.
#
# Option A — kubectl (recommended, never committed to Git):
#   kubectl create secret generic langflow-api-keys \
#     -n langflow \
#     --from-literal=ANTHROPIC_API_KEY=sk-ant-... \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# Option B — edit this file and apply (DO NOT commit with real key):
#   Replace the placeholder below and run: kubectl apply -f secret.yaml
#
# The Langflow pod will not start if ANTHROPIC_API_KEY is empty.
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: langflow-api-keys
  namespace: langflow
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "REPLACE_ME"
---
# ---------------------------------------------------------------------------
# langflow-oauth2-proxy
# ---------------------------------------------------------------------------
# Populated automatically by the keycloak-client-job.
# Do NOT edit this manually — the Job will create/update it.
#
# Fields written by the Job:
#   OAUTH2_PROXY_CLIENT_SECRET  — Keycloak client secret for the langflow client
#   OAUTH2_PROXY_COOKIE_SECRET  — random 32-byte base64 string for cookie signing
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: langflow-oauth2-proxy
  namespace: langflow
type: Opaque
stringData:
  OAUTH2_PROXY_CLIENT_SECRET: "pending-keycloak-job"
  OAUTH2_PROXY_COOKIE_SECRET: "pending-keycloak-job"
