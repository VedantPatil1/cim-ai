# ── oauth2-proxy endpoints (NO auth — must come before the langflow ingress) ──
# Handles /langflow/oauth2/* (callback, start, sign_out, auth, ping).
# No auth-url annotation here — these are the auth endpoints themselves.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: langflow-oauth2
  namespace: langflow
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: "/oauth2/$2"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
spec:
  ingressClassName: nginx
  rules:
    - host: cnoe.localtest.me
      http:
        paths:
          - path: /langflow/oauth2(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: oauth2-proxy
                port:
                  number: 4180
---
# ── Langflow (SSO-protected via nginx auth_request) ──────────────────────────
# nginx checks each request against oauth2-proxy's /oauth2/auth endpoint.
# On 401, nginx redirects the browser to oauth2-proxy's /oauth2/start (Keycloak).
# On 2xx, nginx proxies the request directly to Langflow (path stripped).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: langflow
  namespace: langflow
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: "/$2"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    nginx.ingress.kubernetes.io/auth-url: "https://cnoe.localtest.me:8443/langflow/oauth2/auth"
    nginx.ingress.kubernetes.io/auth-signin: "https://cnoe.localtest.me:8443/langflow/oauth2/start?rd=$escaped_request_uri"
    nginx.ingress.kubernetes.io/auth-response-headers: "Authorization,X-Auth-Request-User,X-Auth-Request-Email"
spec:
  ingressClassName: nginx
  rules:
    - host: cnoe.localtest.me
      http:
        paths:
          - path: /langflow(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: langflow
                port:
                  number: 7860
