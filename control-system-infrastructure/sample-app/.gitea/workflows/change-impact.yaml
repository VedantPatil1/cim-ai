name: Change Impact Analysis

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  change-impact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate diff
        run: git diff origin/main...HEAD > /tmp/pr.diff

      - name: Run change impact analysis
        env:
          GITEA_TOKEN: ${{ secrets.CI_TOKEN }}
          GITHUB_REPOSITORY: ${{ gitea.repository }}
          GITEA_URL: http://my-gitea-http.gitea.svc.cluster.local:3000
          LANGFLOW_URL: http://host.docker.internal:7860
          CHANGE_IMPACT_FLOW_ID: b908e9c2-340d-454b-9e1b-ab356f66cceb
        run: |
          python3 .gitea/scripts/change_impact.py ${{ gitea.event.pull_request.number }} /tmp/pr.diff
