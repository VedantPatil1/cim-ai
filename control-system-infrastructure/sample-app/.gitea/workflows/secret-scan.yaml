name: Secret Scanning

on:
  push:
    branches: ['**']
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  gitleaks:
    name: Detect secrets with gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for accurate diff scanning)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        run: |
          docker run --rm \
            -v "$(pwd):/repo" \
            zricethezav/gitleaks:latest detect \
              --source /repo \
              --report-format sarif \
              --report-path /repo/gitleaks-report.sarif \
              --redact \
              --exit-code 1
        # Exit code 1 = secrets found → workflow fails, PR cannot merge.
        # The SARIF report is written to the workspace for review.

      - name: Upload SARIF report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-sarif
          path: gitleaks-report.sarif
