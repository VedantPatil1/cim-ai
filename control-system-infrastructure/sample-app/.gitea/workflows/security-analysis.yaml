name: Security Analysis

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  analyse:
    runs-on: ubuntu-latest
    container:
      image: node:20-bullseye

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: apt-get update -qq && apt-get install -y -qq python3 python3-pip curl

      - name: Run security analysis
        env:
          GITEA_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITEA_URL: https://cnoe.localtest.me:8443/gitea
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          LANGFLOW_URL: http://host.docker.internal:7860
          FLOW_ID: ${{ secrets.LANGFLOW_FLOW_ID }}
        run: python3 .gitea/scripts/security_check.py

      - name: Upload security metrics artifact
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v3
        with:
          name: security-analysis-metrics-pr${{ github.event.pull_request.number }}
          path: /tmp/security-analysis-metrics.json
          retention-days: 30
