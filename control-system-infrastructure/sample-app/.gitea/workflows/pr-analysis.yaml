name: PR Analysis

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  analyse:
    runs-on: ubuntu-latest
    container:
      image: node:20-bullseye

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update -qq && apt-get install -y -qq python3 python3-pip
          pip3 install --quiet anthropic

      - name: Run PR analysis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITEA_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          GITEA_URL:          https://cnoe.localtest.me:8443/gitea
          REPO:               ${{ github.repository }}
          PR_NUMBER:          ${{ github.event.pull_request.number }}
        run: python3 .gitea/scripts/analyze_pr.py

      - name: Upload token metrics artifact
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v3
        with:
          name: pr-analysis-metrics-pr${{ github.event.pull_request.number }}
          path: /tmp/pr-analysis-metrics.json
          retention-days: 30
