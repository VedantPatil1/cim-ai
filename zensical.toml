[project]
site_name        = "CIM-AI"
site_description = "Agentic AI-based Cloud Infrastructure Management"
site_author      = "Vedant Patil"
docs_dir         = "docs"
site_dir         = "site"

nav = [
  { Home = "index.md" },
  { Methodology = "methodology.md" },
  { "Knowledge Graph" = "knowledge-graph.md" },
  { Installation = [
    { Overview = "installation/index.md" },
    { "Phase 1 Setup" = "installation/Phase1.md" },
  ]},
  { "Platform Engineering" = [
    { Overview = "platform-engineering/index.md" },
    { "idpbuilder & CNOE" = "platform-engineering/01-idpbuilder-and-cnoe.md" },
    { "CD Workflow Design" = "platform-engineering/02-cd-workflow-design.md" },
    { "Manual Setup (Gitea Actions)" = "platform-engineering/03-manual-setup-gitea-actions.md" },
    { "Secret Scanning" = "platform-engineering/04-secret-scanning.md" },
    { "Sandbox Environments" = "platform-engineering/05-sandbox-environments.md" },
  ]},
  { Security = [
    { "Requirements & Enforcement" = "security/index.md" },
    { "Implementation Guide" = "security/implementation.md" },
  ]},
  { "Baseline Prod Infrastructure" = [
    { "Overview" = "baseline-prod-infrastructure/index.md" },
    { "Architecture" = "baseline-prod-infrastructure/architecture.md" },
    { "Tooling & IAM" = "baseline-prod-infrastructure/tooling.md" },
    { "Deployment Procedure" = [
      { "Prerequisites & Session Management" = "baseline-prod-infrastructure/procedure/index.md" },
      { "1. Account Bootstrap" = "baseline-prod-infrastructure/procedure/01-account.md" },
      { "2. State Backend" = "baseline-prod-infrastructure/procedure/02-state.md" },
      { "3. Container Registry" = "baseline-prod-infrastructure/procedure/03-registry.md" },
      { "4. Networking" = "baseline-prod-infrastructure/procedure/04-networking.md" },
      { "5. Compute" = "baseline-prod-infrastructure/procedure/05-compute.md" },
      { "6. ALB Controller" = "baseline-prod-infrastructure/procedure/06-ingress.md" },
      { "7. Application" = "baseline-prod-infrastructure/procedure/07-application.md" },
    ]},
    { "Repositories" = "baseline-prod-infrastructure/repositories.md" },
  ]},
]

[project.theme]
features = [
  "navigation.tabs",
  "navigation.sections",
  "navigation.expand",
  "navigation.top",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.path",
  "navigation.footer",
  "search.highlight",
  "content.code.copy",
  "content.code.annotate",
  "content.tabs.link",
]

[[project.theme.palette]]
scheme      = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme      = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"
